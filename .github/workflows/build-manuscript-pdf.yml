name: Build manuscript PDF

on:
  push:
    paths:
      - "manuscript/**"
      - ".github/workflows/build-manuscript-pdf.yml"
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX manuscript
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: manuscript
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          extra_system_packages: "py3-pygments"

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: tesis-manuscript-pdf
          path: manuscript/main.pdf
          if-no-files-found: error
